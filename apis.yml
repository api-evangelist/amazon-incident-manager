aid: amazon-incident-manager
name: Amazon Incident Manager
description: >-
  AWS Systems Manager Incident Manager is an incident management console
  designed to help users mitigate and recover from incidents affecting their
  AWS-hosted applications. It enables faster incident resolution by automating
  response plans and engaging responders across notification channels.

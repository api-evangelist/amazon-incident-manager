security:
- hmac: []
tags:
- name: GetResourcePolicies#resourceArn
paths:
  /getResourcePolicies#resourceArn:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetResourcePolicies
      description: Retrieves the resource policies attached to the specified response plan.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResourcePoliciesOutput'
        '480':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: resourceArn
        in: query
        required: true
        description: 'The Amazon Resource Name (ARN) of the response plan with the attached resource policy. '
        schema:
          type: string
          pattern: ^arn:aws(-cn|-us-gov)?:[a-z0-9-]*:[a-z0-9-]*:([0-9]{12})?:.+$
          minLength: 0
          maxLength: 1000
      - name: maxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: nextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  description: The maximum number of resource policies to display for each page of results.
                  type: integer
                  minimum: 1
                  maximum: 100
                nextToken:
                  description: The pagination token to continue to the next page of results.
                  type: string
                  minLength: 0
                  maxLength: 2000
      summary: Amazon Incident Manager Get Resource Policies
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - GetResourcePolicies#resourceArn
components:
  parameters:
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
  schemas:
    AccessDeniedException: {}
    ResourcePolicyList:
      type: array
      items:
        $ref: '#/components/schemas/ResourcePolicy'
      minItems: 0
      maxItems: 100
    ThrottlingException: {}
    PolicyId:
      type: string
      minLength: 0
      maxLength: 256
    GetResourcePoliciesOutput:
      type: object
      required:
      - resourcePolicies
      properties:
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The pagination token to continue to the next page of results.
        resourcePolicies:
          allOf:
          - $ref: '#/components/schemas/ResourcePolicyList'
          - description: Details about the resource policy attached to the response plan.
    String:
      type: string
    NextToken:
      type: string
      minLength: 0
      maxLength: 2000
    InternalServerException: {}
    ResourceNotFoundException: {}
    Policy:
      type: string
      minLength: 0
      maxLength: 4000
    ResourcePolicy:
      type: object
      required:
      - policyDocument
      - policyId
      - ramResourceShareRegion
      properties:
        policyDocument:
          allOf:
          - $ref: '#/components/schemas/Policy'
          - description: The JSON blob that describes the policy.
        policyId:
          allOf:
          - $ref: '#/components/schemas/PolicyId'
          - description: The ID of the resource policy.
        ramResourceShareRegion:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The Amazon Web Services Region that policy allows resources to be used in.
      description: The resource policy that allows Incident Manager to perform actions on resources on your behalf.
    ValidationException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4

security:
- hmac: []
tags:
- name: UpdateReplicationSet
paths:
  /updateReplicationSet:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: UpdateReplicationSet
      description: Add or delete Regions from your replication set.
      responses:
        '204':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateReplicationSetOutput'
        '480':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '484':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '485':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - actions
              - arn
              properties:
                actions:
                  description: An action to add or delete a Region.
                  type: array
                  items:
                    $ref: '#/components/schemas/UpdateReplicationSetAction'
                  minItems: 1
                  maxItems: 1
                arn:
                  description: The Amazon Resource Name (ARN) of the replication set you're updating.
                  type: string
                  pattern: ^arn:aws(-cn|-us-gov)?:[a-z0-9-]*:[a-z0-9-]*:([0-9]{12})?:.+$
                  minLength: 0
                  maxLength: 1000
                clientToken:
                  description: A token that ensures that the operation is called only once with the specified details.
                  type: string
                  minLength: 0
                  maxLength: 128
      summary: Amazon Incident Manager Update Replication Set
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - UpdateReplicationSet
components:
  parameters:
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
  schemas:
    DeleteRegionAction:
      type: object
      required:
      - regionName
      properties:
        regionName:
          allOf:
          - $ref: '#/components/schemas/RegionName'
          - description: The name of the Amazon Web Services Region you're deleting from the replication set.
      description: Defines the information about the Amazon Web Services Region you're deleting from your replication set.
    AddRegionAction:
      type: object
      required:
      - regionName
      properties:
        regionName:
          allOf:
          - $ref: '#/components/schemas/RegionName'
          - description: The Amazon Web Services Region name to add to the replication set.
        sseKmsKeyId:
          allOf:
          - $ref: '#/components/schemas/SseKmsKey'
          - description: The KMS key ID to use to encrypt your replication set.
      description: 'Defines the Amazon Web Services Region and KMS key to add to the replication set. '
    AccessDeniedException: {}
    UpdateReplicationSetAction:
      type: object
      properties:
        addRegionAction:
          allOf:
          - $ref: '#/components/schemas/AddRegionAction'
          - description: Details about the Amazon Web Services Region that you're adding to the replication set.
        deleteRegionAction:
          allOf:
          - $ref: '#/components/schemas/DeleteRegionAction'
          - description: Details about the Amazon Web Services Region that you're deleting to the replication set.
      description: Details used when updating the replication set.
    ThrottlingException: {}
    ConflictException: {}
    SseKmsKey:
      type: string
      minLength: 0
      maxLength: 2048
    RegionName:
      type: string
      minLength: 0
      maxLength: 20
    InternalServerException: {}
    UpdateReplicationSetOutput:
      type: object
      properties: {}
    ResourceNotFoundException: {}
    ValidationException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4

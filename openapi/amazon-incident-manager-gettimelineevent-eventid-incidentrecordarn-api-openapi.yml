tags:
- name: GetTimelineEvent#eventId&incidentRecordArn
paths:
  /getTimelineEvent#eventId&incidentRecordArn:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: GetTimelineEvent
      description: Retrieves a timeline event based on its ID and incident record.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTimelineEventOutput'
        '480':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: eventId
        in: query
        required: true
        description: The ID of the event. You can get an event's ID when you create it, or by using <code>ListTimelineEvents</code>.
        schema:
          type: string
          minLength: 0
          maxLength: 50
      - name: incidentRecordArn
        in: query
        required: true
        description: The Amazon Resource Name (ARN) of the incident that includes the timeline event.
        schema:
          type: string
          pattern: ^arn:aws(-cn|-us-gov)?:[a-z0-9-]*:[a-z0-9-]*:([0-9]{12})?:.+$
          minLength: 0
          maxLength: 1000
      summary: Amazon Incident Manager Get Timeline Event
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - GetTimelineEvent#eventId&incidentRecordArn
components:
  parameters:
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
  schemas:
    AccessDeniedException: {}
    EventReference:
      type: object
      properties:
        relatedItemId:
          allOf:
          - $ref: '#/components/schemas/GeneratedId'
          - description: The ID of a <code>RelatedItem</code> referenced in a <code>TimelineEvent</code>.
        resource:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The Amazon Resource Name (ARN) of an Amazon Web Services resource referenced in a <code>TimelineEvent</code>.
      description: An item referenced in a <code>TimelineEvent</code> that is involved in or somehow associated with an incident. You can specify an Amazon Resource Name (ARN) for an Amazon Web Services resource or a <code>RelatedItem</code> ID.
    EventReferenceList:
      type: array
      items:
        $ref: '#/components/schemas/EventReference'
      minItems: 0
      maxItems: 10
    ThrottlingException: {}
    Arn:
      type: string
      pattern: ^arn:aws(-cn|-us-gov)?:[a-z0-9-]*:[a-z0-9-]*:([0-9]{12})?:.+$
      minLength: 0
      maxLength: 1000
    EventData:
      type: string
      minLength: 0
      maxLength: 12000
    Timestamp:
      type: string
      format: date-time
    UUID:
      type: string
      minLength: 0
      maxLength: 50
    InternalServerException: {}
    GeneratedId:
      type: string
      pattern: ^related-item/(ANALYSIS|INCIDENT|METRIC|PARENT|ATTACHMENT|OTHER|AUTOMATION|INVOLVED_RESOURCE|TASK)/([0-9]|[A-F]){32}$
      minLength: 0
      maxLength: 200
    ResourceNotFoundException: {}
    GetTimelineEventOutput:
      type: object
      required:
      - event
      properties:
        event:
          allOf:
          - $ref: '#/components/schemas/TimelineEvent'
          - description: Details about the timeline event.
    TimelineEvent:
      type: object
      required:
      - eventData
      - eventId
      - eventTime
      - eventType
      - eventUpdatedTime
      - incidentRecordArn
      properties:
        eventData:
          allOf:
          - $ref: '#/components/schemas/EventData'
          - description: A short description of the event.
        eventId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          - description: The ID of the timeline event.
        eventReferences:
          allOf:
          - $ref: '#/components/schemas/EventReferenceList'
          - description: A list of references in a <code>TimelineEvent</code>.
        eventTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time that the event occurred.
        eventType:
          allOf:
          - $ref: '#/components/schemas/TimelineEventType'
          - description: The type of event that occurred. Currently Incident Manager supports only the <code>Custom Event</code> type.
        eventUpdatedTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time that the timeline event was last updated.
        incidentRecordArn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The Amazon Resource Name (ARN) of the incident that the event occurred during.
      description: 'A significant event that happened during the incident. '
    ValidationException: {}
    TimelineEventType:
      type: string
      minLength: 0
      maxLength: 100
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/ssm-incidents/
